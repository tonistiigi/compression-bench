name: bench

# Runs the compression benchmark on GitHub-hosted runners and uploads each run's
# result JSON as an artifact. Running on both amd64 and arm64 populates the
# cross-arch determinism matrix (the corpus itself is always linux/amd64 layers,
# so the only variable is the CPU the compressor runs on). Pull the artifacts
# locally with `compbench pull` and merge with local results via `compbench report`.

on:
  workflow_dispatch:
    inputs:
      config:
        description: config file to use
        default: compbench.yaml
        required: false
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm # remove this entry if arm64 runners are unavailable
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install external compressors
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pigz zstd

      # Optional: authenticate to Docker Hub to avoid anonymous pull rate limits.
      # Skipped automatically when the secrets are not configured.
      - name: Docker Hub login
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Cache the decompressed corpus so the registry pull only happens once per
      # image set (prep is idempotent and skips when corpus/<image>/ exists).
      - name: Cache corpus
        uses: actions/cache@v4
        with:
          path: corpus
          key: corpus-${{ hashFiles(inputs.config || 'compbench.yaml') }}
          restore-keys: corpus-

      - name: Build (with cgo zstd)
        run: CGO_ENABLED=1 go build -tags cgo_zstd -o compbench .

      - name: Run benchmark
        run: ./compbench run --config "${{ inputs.config || 'compbench.yaml' }}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: compbench-results-${{ matrix.arch }}-${{ github.run_id }}
          path: results/*.json
          if-no-files-found: error
          retention-days: 90
